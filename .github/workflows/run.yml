name: 番剧新闻RSS自动更新

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        
      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: 抓取并生成RSS
        run: python main.py
        
      - name: 提交更新
        run: |
          git config --global user.name "Anime RSS Bot"
          git config --global user.email "bot@github.com"
          git add rss.xml
          git diff --staged --quiet || git commit -m "auto update rss $(date +'%Y-%m-%d %H:%M:%S')"
          git push
